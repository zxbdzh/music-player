<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐馆 - 全屏沉浸模式</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    <link rel="stylesheet" href="./assets/libs/aplayer/music.css">

    <style>
        /* 1. 强制系统 UI 为白色，适配暗色背景 */
        :root {
            --heo-main: #ef50a8;
            --white-text: #ffffff;
        }

        body {
            background: #0d0d0d !important;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--white-text) !important;
        }

        /* 2. 全屏高斯模糊背景 */
        #an_music_bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-position: center;
            background-size: cover;
            filter: blur(60px) brightness(0.5); /* 提升亮度以适配 */
            transition: background-image 1s ease-in-out;
            transform: scale(1.1);
        }

        /* 3. 【核心修复】全屏居中布局重组 */
        body.single-music-mode #anMusic-page {
            height: 100vh;
            display: flex;
            align-items: center; /* 垂直居中 */
            justify-content: center; /* 水平居中 */
        }

        body.single-music-mode .aplayer {
            background: transparent !important;
            box-shadow: none !important;
            margin: 0 !important;
            width: 100%;
            display: flex !important;
            flex-direction: column !important; /* 整体垂直堆叠 */
            align-items: center !important;
        }

        body.single-music-mode .aplayer-body {
            width: 100% !important;
            display: flex;
            flex-direction: column !important; /* 内部垂直堆叠 */
            align-items: center;
        }

        /* 3a. 封面居中 */
        body.single-music-mode .aplayer-pic {
            width: 200px !important;
            height: 200px !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6) !important;
            float: none !important;
            margin: 0 auto 30px auto !important;
        }

        /* 3b. 信息区域居中 */
        body.single-music-mode .aplayer-info {
            width: 100% !important;
            text-align: center;
            padding: 0 !important;
            margin: 0 !important;
            background: transparent !important;
        }

        body.single-music-mode .aplayer-music {
            margin-bottom: 30px !important;
        }
        body.single-music-mode .aplayer-title {
            font-size: 20px !important;
            color: var(--white-text) !important;
        }
        body.single-music-mode .aplayer-author {
            color: rgba(255,255,255,0.7) !important;
        }

        /* 3c. 歌词：全屏长度，垂直堆叠换行 */
        body.single-music-mode .aplayer-lrc {
            display: block !important;
            height: 60vh !important; /* 强制占据 50% 屏幕高度 */
            width: 100% !important; /* 强制占据 80% 屏幕宽度 */
            margin: 0 auto !important;
            mask-image: linear-gradient(to bottom, transparent 0%, #000 15%, #000 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 15%, #000 85%, transparent 100%);
        }

        body.single-music-mode .aplayer-lrc p {
            color: rgba(255, 255, 255, 0.5) !important;
            font-size: 19px !important;
            min-height: 55px !important; /* 增加行高以容纳原词+翻译 */
            line-height: 1.4 !important;
            margin: 15px 0 !important;
            display: flex !important;
            flex-direction: column !important; /* 原词和翻译换行 */
            align-items: center;
            justify-content: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 翻译样式 */
        body.single-music-mode .aplayer-lrc p span.lrc-trans {
            font-size: 15px !important;
            opacity: 0.7;
            margin-top: 6px;
        }

        body.single-music-mode .aplayer-lrc p.aplayer-lrc-current {
            color: var(--white-text) !important;
            font-size: 24px !important;
            font-weight: bold !important;
            transform: scale(1.05);
        }

        /* 3d. 控制条适配白色系统 UI */
        body.single-music-mode .aplayer-controller {
            color: var(--white-text) !important;
            margin-top: 20px !important;
            width: 80% !important;
        }
        body.single-music-mode .aplayer-icon path { fill: var(--white-text) !important; }
        body.single-music-mode .aplayer-bar-wrap .aplayer-bar { background: rgba(255, 255, 255, 0.2) !important; }
        body.single-music-mode .aplayer-played { background: var(--heo-main) !important; }

        /* 隐藏单曲不需要的按钮 */
        body.single-music-mode .aplayer-icon-menu { display: none !important; }
    </style>
</head>

<body class="single-music-mode">
<div id="an_music_bg"></div>
<div id="anMusic-page">
    <div id="anMusic-page-meting"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const musicId = urlParams.get('id') || '2016139765'; // 默认测试 ID
    const server = urlParams.get('server') || 'netease';

    let lrcData = [];

    // 强力解析器：拆分原词与翻译
    function parseLrc(lrcText) {
        const container = document.querySelector('.aplayer-lrc-contents');
        if (!container) return;
        lrcData = [];
        let html = '';

        lrcText.split('\n').forEach(line => {
            const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
            if (match) {
                const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
                let text = match[3].trim();
                if (text) {
                    // 拆分逻辑：支持中英文括号
                    let mainText = text;
                    let transText = "";
                    const splitMatch = text.match(/(.*)[(\uff08](.*)[)\uff09]/);
                    if (splitMatch) {
                        mainText = splitMatch[1].trim();
                        transText = splitMatch[2].trim();
                    }
                    lrcData.push({ time });
                    html += `<p>${mainText}${transText ? `<span class="lrc-trans">${transText}</span>` : ''}</p>`;
                }
            }
        });
        container.innerHTML = html;
    }

    // 强力居中滚动脚本
    function syncLrc(currentTime) {
        const container = document.querySelector('.aplayer-lrc-contents');
        const p = container.querySelector('p');
        if (!p) return;
        const ps = container.querySelectorAll('p');

        let activeIndex = 0;
        for (let i = 0; i < lrcData.length; i++) {
            if (currentTime >= lrcData[i].time) activeIndex = i;
            else break;
        }

        // 核心位移：让高亮行保持在容器正中间
        const pHeight = p.offsetHeight || 55;
        const currentP = ps[activeIndex];
        if(currentP) {
            ps.forEach(el => el.classList.remove('aplayer-lrc-current'));
            currentP.classList.add('aplayer-lrc-current');
            // 自动适配不同高度的歌词行进行平滑滚动
            container.style.transform = `translateY(${pHeight * 3.5 - (pHeight * activeIndex)}px)`;
        }
    }

    // 补偿逻辑：从备用 API 抓取歌词
    async function fetchPatchLrc(id, ap) {
        try {
            const res = await fetch(`https://api.injahow.cn/meting/?type=lrc&id=${id}&server=netease`);
            const text = await res.text();
            if (text.includes('[')) {
                ap.list.audios[0].lrc = text; // 注入数据
                parseLrc(text);
                ap.on('timeupdate', () => syncLrc(ap.audio.currentTime));
                console.log("歌词补丁：注入成功");
            }
        } catch (e) { console.error("歌词抓取失败", e); }
    }

    // 注入 MetingJS
    document.getElementById('anMusic-page-meting').innerHTML =
        `<meting-js id="${musicId}" server="${server}" type="song" lrc-type="3" api="https://api.i-meto.com/meting/api?server=:server&type=:type&id=:id"></meting-js>`;

    function start() {
        const mJS = document.querySelector('meting-js');
        if (mJS && mJS.aplayer) {
            const ap = mJS.aplayer;
            ap.on('canplay', () => {
                document.getElementById('an_music_bg').style.backgroundImage = `url("${ap.list.audios[0].cover}")`;
                // 强制唤醒
                fetchPatchLrc(musicId, ap);
            });
        } else { setTimeout(start, 200); }
    }

    const script = document.createElement('script');
    script.src = "https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js";
    script.onload = start;
    document.body.appendChild(script);
</script>
</body>
</html>
